<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusHub Test Server</title>
    <style>
        body {
            background-color: #0A0A0A;
            color: white;
            font-family: 'sans-serif';
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .card {
            background: #141414;
            border: 1px solid #2A2A2A;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #FF6B00; font-size: 24px; margin-bottom: 8px; }
        p { color: #888; font-size: 14px; margin-bottom: 24px; }
        .user-info {
            display: none;
            padding: 20px;
            background: #0A0A0A;
            border-radius: 12px;
            border: 1px solid #FF6B0033;
        }
        .status {
            color: #00FF88;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #FF6B00;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <h1>🎯 FOCUSHUB TEST</h1>
        <p id="statusText">Aguardando sinal do Focus OS...</p>
        
        <div id="userInfo" class="user-info">
            <div class="status">● SSO Conectado</div>
            <div id="avatar" class="avatar">?</div>
            <h2 id="userName" style="margin: 0; font-size: 20px;">-</h2>
            <p id="userEmail" style="margin: 4px 0 0; font-size: 12px; color: #555;">-</p>
            <div style="margin-top: 20px; padding: 10px; border-top: 1px solid #222; font-size: 10px; color: #444;">
                Token capturado com sucesso via postMessage.
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('message', (event) => {
            if (event.data?.type !== 'FOCUSOS_AUTH') return;

            const { token, user } = event.data;
            
            document.getElementById('statusText').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userName').innerText = user.name || 'Usuário Teste';
            document.getElementById('userEmail').innerText = user.email || '';
            
            if (user.image) {
                document.getElementById('avatar').innerHTML = `<img src="${user.image}" style="width:100%; height:100%; border-radius:50%">`;
            } else {
                document.getElementById('avatar').innerText = (user.name || 'U')[0].toUpperCase();
            }

            // Confirmar recebimento ao Focus OS
            event.source.postMessage({
                type: 'FOCUSHUB_AUTH_OK',
                userId: user.id
            }, event.origin);
        });
    </script>
</body>
</html>
